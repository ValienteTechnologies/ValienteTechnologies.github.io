<!-- Brochures Modals -->
{% assign brochures = site.data.brochures[site.active_lang] | default: site.data.brochures.tr %}
{% for project in brochures.items %}
<div
  class="brochures-modal modal fade"
  id="p{{ forloop.index }}"
  tabindex="-1"
  role="dialog"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="close-modal" data-dismiss="modal">
        <div class="lr">
          <div class="rl"></div>
        </div>
      </div>
      <div class="container">
        <div class="row">
          <div class="col-lg-8 mx-auto">
            <div class="modal-body">
              <!-- Project Details Go Here -->
              <h2 class="text-uppercase">{{ project.title }}</h2>
              <p class="item-intro text-muted">{{ project.subtitle }}</p>
              <picture>
                <source srcset="{{ project.image | replace: '.png', '.webp' }}" type="image/webp">
                <img class="img-fluid d-block mx-auto" src="{{ project.image }}" alt="{{ project.alt }}" loading="lazy">
              </picture>
              <p>{{ project.content | markdownify }}</p>
              <button
                class="btn btn-primary"
                data-dismiss="modal"
                type="button"
              >
                {{ brochures.closebutton | default: "Close Project" }}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endfor %}
<!-- End Brochures Modals -->
