tr: &DEFAULT_TR
  title: "Hizmetlerimiz"
  section: services
  list:
    - title: "Sızma Testleri"
      desc: "Kurumsal ağ, sistem ve altyapıdaki açıkları belirlemek için <strong>OSSTMM, OWASP</strong> ve <strong>PTES</strong> metodolojileriyle gerçekleştirilen kapsamlı güvenlik kontrolleri ve risk analizleri."
      icon: fas fa-user-secret

    - title: "Red Teaming"
      desc: "Gerçek dünya saldırı senaryolarını simüle ederek kurumun <strong>tespit ve müdahale kapasitesini</strong> ölçen, çok katmanlı ve hedef odaklı proaktif güvenlik operasyonları."
      icon: fas fa-crosshairs

    - title: "Uygulama Güvenliği"
      desc: "Web, mobil ve API uç noktalarındaki zafiyetleri tespit etmek için <strong>kaynak kod analizi</strong> ve <strong>dinamik testler</strong> (DAST/SAST) ile uçtan uca yazılım güvenliği."
      icon: fas fa-code

    - title: "Bulut Güvenliği"
      desc: "AWS, Azure ve Google Cloud ortamlarında <strong>konfigürasyon denetimi</strong> ve verilerinizi <strong>fidye yazılımlarına</strong> karşı koruyan güvenli bulut mimarisi çözümleri."
      icon: fas fa-cloud

    - title: "Son Kullanıcı Testleri"
      desc: "Kurumunuza özel <strong>Phishing (Oltalama) simülasyonları</strong> ve sosyal mühendislik senaryoları ile çalışan farkındalığını ölçen ve insan odaklı riskleri minimize eden analizler."
      icon: fas fa-user-shield

    - title: "Uyumluluk ve Denetim"
      desc: "<strong>KVKK, GDPR, ISO 27001</strong> ve <strong>NIST</strong> standartlarına uyum süreçlerinde profesyonel danışmanlık, boşluk analizi ve kurumsal farkındalık eğitimleri."
      icon: fas fa-clipboard-check

tr-TR:
  <<: *DEFAULT_TR

en:
  title: "Our Services"
  section: services
  list:
    - title: "Penetration Testing"
      desc: "Comprehensive security audits and risk analyses using <strong>OSSTMM, OWASP</strong>, and <strong>PTES</strong> methodologies to identify vulnerabilities in corporate networks, systems, and infrastructure."
      icon: fas fa-user-secret

    - title: "Red Teaming"
      desc: "Multi-layered, target-focused proactive security operations that simulate real-world attack scenarios to measure an organization's <strong>detection and response capability</strong>."
      icon: fas fa-crosshairs

    - title: "Application Security"
      desc: "End-to-end software security through <strong>source code analysis</strong> and <strong>dynamic testing</strong> (DAST/SAST) to identify vulnerabilities in web, mobile, and API endpoints."
      icon: fas fa-code

    - title: "Cloud Security"
      desc: "<strong>Configuration audits</strong> in AWS, Azure, and Google Cloud environments, and secure cloud architecture solutions that protect your data against <strong>ransomware</strong>."
      icon: fas fa-cloud

    - title: "End-User Testing"
      desc: "Institution-specific <strong>phishing simulations</strong> and social engineering scenarios that measure employee awareness and minimize human-centric risks."
      icon: fas fa-user-shield

    - title: "Compliance & Audit"
      desc: "Professional consulting, gap analysis, and corporate awareness training for <strong>GDPR, ISO 27001</strong>, and <strong>NIST</strong> compliance processes."
      icon: fas fa-clipboard-check
