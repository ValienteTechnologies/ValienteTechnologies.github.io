# Supported link types:
#   section: services        → scrolls to /#services (home only) or links to /#services (subpages)
#   url: /about              → links to a page (automatically prefixed with language)
#   static: true             → url is NOT language-prefixed (e.g. external or the blog)
#   children:                → renders a dropdown; each child supports url, section, or static
#     - title: "..."
#       url: /services/pentest

tr: &DEFAULT_TR
  nav:
    - title: "Ana Sayfa"
      url: /
      children:
        - title: "Hizmetler"
          section: services
        - title: "Referanslar"
          section: references
        - title: "Müşteri Yorumları"
          section: testimonials
    - title: "Kurumsal"
      url: /about
      children:
        - title: "Hakkımızda"
          url: /about#about
        - title: "Sertifikalar"
          url: /about#certifications
        - title: "Broşürlerimiz"
          url: /about#portfolio
        - title: "İş Ortakları"
          url: /about#partners
    - title: "İletişim"
      url: /contact
    - title: "Blog"
      url: /blog/
      static: true

tr-TR:
  <<: *DEFAULT_TR

en:
  nav:
    - title: "Home"
      url: /
      children:
        - title: "Services"
          section: services
        - title: "References"
          section: references
        - title: "Testimonials"
          section: testimonials
    - title: "Corporate"
      url: /about
      children:
        - title: "About"
          url: /about#about
        - title: "Certifications"
          url: /about#certifications
        - title: "Brochures"
          url: /about#portfolio
        - title: "Partners"
          url: /about#partners
    - title: "Contact"
      url: /contact
    - title: "Blog"
      url: /blog/
      static: true
