# Supported link types:
#   section: services        → scrolls to /#services (home only) or links to /#services (subpages)
#   url: /about              → links to a page (automatically prefixed with language)
#   static: true             → url is NOT language-prefixed (e.g. external or the blog)
#   children:                → renders a dropdown; each child supports url, section, or static
#     - title: "..."
#       url: /services/pentest

tr: &DEFAULT_TR
  nav:
    - title: "Hizmetler"
      url: /
    - title: "Hakkımızda"
      children:
        - title: "Şirket"
          url: /about
        - title: "Sertifikalar"
          url: /about#certifications
        - title: "İş Ortakları"
          url: /partners
    - title: "Blog"
      url: /blog/
      static: true
    - title: "İletişim"
      url: /contact

tr-TR:
  <<: *DEFAULT_TR

en:
  nav:
    - title: "Services"
      url: /
    - title: "About"
      children:
        - title: "Company"
          url: /about
        - title: "Certifications"
          url: /about#certifications
        - title: "Partners"
          url: /partners
    - title: "Blog"
      url: /blog/
      static: true
    - title: "Contact"
      url: /contact
