# Turkish
# -----------------
# Supported link types:
#   section: services        → scrolls to /#services (home only) or links to /#services (subpages)
#   url: /about              → links to a page
#   children:                → renders a dropdown; each child supports url or section
#     - title: "..."
#       url: /services/pentest
tr: &DEFAULT_TR
  nav:
    - title: "Hizmetler"
      section: services
    - title: "Referanslar"
      section: references
    - title: "Hakkımızda"
      url: /about
    - title: "İş Ortakları"
      section: partners
    - title: "Blog"
      url: /blog/
    - title: "İletişim"
      section: contact
tr-TR:
  <<: *DEFAULT_TR
