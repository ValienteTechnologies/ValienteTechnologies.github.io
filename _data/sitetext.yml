tr: &DEFAULT_TR
  header:
    title: Denetim bir gerekliliktir, güvenlik ise strateji.
    text: Sızma Testi ve Siber Güvenlik Hizmetleri
    button: Keşfet
    buttonlink: "#services"

  services:
    title: "Hizmetlerimiz"
    section: services
    list:
      - title: "Sızma Testleri"
        desc: "Kurumsal ağ, sistem ve altyapıdaki açıkları belirlemek için <strong>OSSTMM, OWASP</strong> ve <strong>PTES</strong> metodolojileriyle gerçekleştirilen kapsamlı güvenlik kontrolleri ve risk analizleri."
        icon: fas fa-user-secret

      - title: "Red Teaming"
        desc: "Gerçek dünya saldırı senaryolarını simüle ederek kurumun <strong>tespit ve müdahale kapasitesini</strong> ölçen, çok katmanlı ve hedef odaklı proaktif güvenlik operasyonları."
        icon: fas fa-crosshairs

      - title: "Uygulama Güvenliği"
        desc: "Web, mobil ve API uç noktalarındaki zafiyetleri tespit etmek için <strong>kaynak kod analizi</strong> ve <strong>dinamik testler</strong> (DAST/SAST) ile uçtan uca yazılım güvenliği."
        icon: fas fa-code

      - title: "Bulut Güvenliği"
        desc: "AWS, Azure ve Google Cloud ortamlarında <strong>konfigürasyon denetimi</strong> ve verilerinizi <strong>fidye yazılımlarına</strong> karşı koruyan güvenli bulut mimarisi çözümleri."
        icon: fas fa-cloud

      - title: "Son Kullanıcı Testleri"
        desc: "Kurumunuza özel <strong>Phishing (Oltalama) simülasyonları</strong> ve sosyal mühendislik senaryoları ile çalışan farkındalığını ölçen ve insan odaklı riskleri minimize eden analizler."
        icon: fas fa-user-shield

      - title: "Uyumluluk ve Denetim"
        desc: "<strong>KVKK, GDPR, ISO 27001</strong> ve <strong>NIST</strong> standartlarına uyum süreçlerinde profesyonel danışmanlık, boşluk analizi ve kurumsal farkındalık eğitimleri."
        icon: fas fa-clipboard-check

